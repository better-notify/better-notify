name: Deploy website

on:
  push:
    branches:
      - main

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      affected: ${{ steps.affected.outputs.has-projects }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - id: affected
        name: Affected projects
        uses: ./.github/actions/affected-projects
        with:
          base: HEAD~1
          task: build
          package-glob: apps/web/package.json
          include-private: 'true'
          require-dist: 'false'
          summary-title: Affected Web App

  deploy:
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.affected == 'true'
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy
        run: pnpm web:deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
