name: CI

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

env:
  DO_NOT_TRACK: '1'
  TURBO_TELEMETRY_DISABLED: '1'
  TURBO_TELEMETRY_MESSAGE_DISABLED: '1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci

  bundle-projects:
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.projects.outputs.projects }}
      pattern: ${{ steps.projects.outputs.pattern }}
      has-projects: ${{ steps.projects.outputs.has_projects }}
      count: ${{ steps.projects.outputs.count }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - id: projects
        uses: ./.github/actions/affected-projects
        with:
          base: origin/${{ github.base_ref }}
          head: HEAD
          task: build
          summary-title: Affected Bundle Projects

  bundle-size:
    needs: bundle-projects
    if: ${{ needs.bundle-projects.outputs.has-projects == 'true' }}
    runs-on: ubuntu-latest
    name: Bundle size
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - uses: preactjs/compressed-size-action@2.9.1
        env:
          BUNDLE_ANALYZE: 'true'
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          install-script: pnpm install --frozen-lockfile
          build-script: build
          pattern: ${{ needs.bundle-projects.outputs.pattern }}
          exclude: '{**/*.map,**/node_modules/**,**/bundle-analysis.json}'
          comment-key: betternotify-dist
          strip-hash: '-([A-Za-z0-9_-]{8})(?=\.js$)'
