name: CI

on:
  pull_request:

permissions:
  contents: read

env:
  DO_NOT_TRACK: '1'
  TURBO_TELEMETRY_DISABLED: '1'
  TURBO_TELEMETRY_MESSAGE_DISABLED: '1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/prepare
      - run: pnpm run ci

  bundle-projects:
    name: Bundle and analyze affected projects
    runs-on: ubuntu-latest
    needs: [ci]
    outputs:
      projects: ${{ steps.projects.outputs.projects }}
      pattern: ${{ steps.projects.outputs.pattern }}
      has-projects: ${{ steps.projects.outputs.has_projects }}
      count: ${{ steps.projects.outputs.count }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: ./.github/actions/prepare
        with:
          fetch-depth: 0

      - id: projects
        uses: ./.github/actions/affected-projects
        with:
          base: origin/${{ github.base_ref }}
          head: HEAD
          task: build
          summary-title: Affected Bundle Projects

      - if: steps.projects.outputs.pattern != ''
        uses: preactjs/compressed-size-action@2.9.1
        env:
          BUNDLE_ANALYZE: 'true'
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          install-script: pnpm install --frozen-lockfile
          build-script: build
          pattern: ${{ steps.projects.outputs.pattern }}
          exclude: '{**/*.map,**/node_modules/**,**/bundle-analysis.json}'
          comment-key: betternotify-dist
          strip-hash: '-([A-Za-z0-9_-]{8})(?=\.js$)'

  publish-preview:
    name: Preview ${{ matrix.project.name }}
    runs-on: ubuntu-latest
    needs: [bundle-projects]
    if: >-
      needs.bundle-projects.outputs.has-projects == 'true'
      && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.bundle-projects.outputs.projects) }}
    steps:
      - uses: ./.github/actions/prepare
        with:
          registry-url: https://registry.npmjs.org

      - run: pnpm exec turbo run build --filter="${{ matrix.project.name }}..."

      - id: meta
        shell: bash
        run: echo "version=0.0.0-preview.${{ github.event.pull_request.number }}.${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/publish-packages
        with:
          filter: './${{ matrix.project.path }}'
          tag: pr-${{ github.event.pull_request.number }}
          version: ${{ steps.meta.outputs.version }}
          provenance: 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  update-pr-preview:
    name: Update PR with preview packages
    runs-on: ubuntu-latest
    needs: [bundle-projects, publish-preview]
    if: always() && needs.publish-preview.result == 'success'
    permissions:
      pull-requests: write
    steps:
      - id: meta
        shell: bash
        run: echo "version=0.0.0-preview.${{ github.event.pull_request.number }}.${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - id: content
        shell: bash
        env:
          PROJECTS: ${{ needs.bundle-projects.outputs.projects }}
        run: |
          tag="pr-${{ github.event.pull_request.number }}"
          version="${{ steps.meta.outputs.version }}"

          {
            echo "body<<GITHUB_OUTPUT_DELIMITER"
            echo "<!-- start Preview packages update -->"
            echo "<details>"
            echo "<summary>Preview packages</summary>"
            echo ""
            echo "| Package | Install |"
            echo "| --- | --- |"
            jq -r --arg tag "$tag" '.[] | "| `\(.name)` | `npm install \(.name)@\($tag)` |"' <<< "$PROJECTS"
            echo ""
            echo "> Version: \`${version}\`"
            echo ""
            echo "</details>"
            echo "<!-- end Preview packages update -->"
            echo "GITHUB_OUTPUT_DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - uses: nefrob/pr-description@4dcc9f3ad5ec06b2a197c5f8f93db5e69d2fdca7 # v1.2.0
        with:
          content: ${{ steps.content.outputs.body }}
          regex: '<!-- start Preview packages update -->.*?<!-- end Preview packages update -->'
          regexFlags: ims
          appendContentOnMatchOnly: 'true'
          token: ${{ secrets.GITHUB_TOKEN }}
