name: CI

on:
  pull_request:

permissions:
  contents: read

env:
  DO_NOT_TRACK: '1'
  TURBO_TELEMETRY_DISABLED: '1'
  TURBO_TELEMETRY_MESSAGE_DISABLED: '1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview-gate:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.fork == false
    steps:
      - run: echo "Preview gate passed"

  ci:
    runs-on: ubuntu-latest
    needs: [preview-gate]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/prepare
      - run: pnpm run ci

  code-quality:
    name: Code quality
    runs-on: ubuntu-latest
    needs: [preview-gate]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/prepare
      - run: pnpm test:coverage

  bundle-projects:
    name: Bundle and analyze affected projects
    runs-on: ubuntu-latest
    needs: [preview-gate, ci]
    outputs:
      projects: ${{ steps.projects.outputs.projects }}
      pattern: ${{ steps.projects.outputs.pattern }}
      has-projects: ${{ steps.projects.outputs.has_projects }}
      count: ${{ steps.projects.outputs.count }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/prepare

      - id: projects
        uses: ./.github/actions/affected-projects
        with:
          base: origin/${{ github.base_ref }}
          head: HEAD
          task: build
          summary-title: Affected Bundle Projects

      - if: steps.projects.outputs.pattern != ''
        uses: preactjs/compressed-size-action@2.9.1
        env:
          BUNDLE_ANALYZE: 'true'
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          install-script: pnpm install --frozen-lockfile
          build-script: build
          pattern: ${{ steps.projects.outputs.pattern }}
          exclude: '{**/*.map,**/node_modules/**,**/bundle-analysis.json}'
          comment-key: betternotify-dist
          strip-hash: '-([A-Za-z0-9_-]{8})(?=\.js$)'

  publish-preview:
    name: Preview ${{ matrix.project.name }}
    runs-on: ubuntu-latest
    needs: [bundle-projects, preview-gate]
    if: needs.bundle-projects.outputs.has-projects == 'true'
    environment: preview
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.bundle-projects.outputs.projects) }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/prepare
        with:
          registry-url: https://registry.npmjs.org

      - run: pnpm exec turbo run build --filter="${{ matrix.project.name }}..."

      - id: meta
        shell: bash
        run: echo "version=0.0.0-preview.${{ github.event.pull_request.number }}.${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/publish-packages
        with:
          filter: './${{ matrix.project.path }}'
          tag: pr-${{ github.event.pull_request.number }}
          version: ${{ steps.meta.outputs.version }}
          provenance: 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  update-pr-preview:
    name: Update PR with preview packages
    runs-on: ubuntu-latest
    needs: [bundle-projects, publish-preview]
    if: always() && needs.publish-preview.result == 'success'
    permissions:
      pull-requests: write
    steps:
      - id: meta
        shell: bash
        run: echo "version=0.0.0-preview.${{ github.event.pull_request.number }}.${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - id: content
        shell: bash
        env:
          PROJECTS: ${{ needs.bundle-projects.outputs.projects }}
        run: |
          tag="pr-${{ github.event.pull_request.number }}"
          version="${{ steps.meta.outputs.version }}"

          {
            echo "body<<GITHUB_OUTPUT_DELIMITER"
            echo "<!-- start Preview packages update -->"
            echo "<details>"
            echo "<summary>Preview packages</summary>"
            echo ""
            echo "| Package | Install |"
            echo "| --- | --- |"
            jq -r --arg tag "$tag" '.[] | "| `\(.name)` | `npm install \(.name)@\($tag)` |"' <<< "$PROJECTS"
            echo ""
            echo "> Version: \`${version}\`"
            echo ""
            echo "</details>"
            echo "<!-- end Preview packages update -->"
            echo "GITHUB_OUTPUT_DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - uses: nefrob/pr-description@4dcc9f3ad5ec06b2a197c5f8f93db5e69d2fdca7 # v1.2.0
        with:
          content: ${{ steps.content.outputs.body }}
          regex: '<!-- start Preview packages update -->.*?<!-- end Preview packages update -->'
          regexFlags: ims
          appendContentOnMatchOnly: 'true'
          token: ${{ secrets.GITHUB_TOKEN }}

  pr-validation:
    name: PR validation
    needs: [preview-gate, ci, code-quality, bundle-projects]
    if: ${{ always() && needs.preview-gate.result == 'success' && !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/check-for-job-errors
        with:
          needs: ${{ toJson(needs) }}

  deploy-preview-web:
    name: Deploy preview docs
    runs-on: ubuntu-latest
    needs: [ci, preview-gate]
    environment: preview
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/prepare

      - name: Build docs site
        run: pnpm exec turbo run build --filter=@betternotify/web...

      - name: Upload preview version
        id: preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: versions upload --preview-alias "pr-${{ github.event.pull_request.number }}"

      - name: Parse preview URL
        id: url
        shell: bash
        run: |
          url=$(echo "${{ steps.preview.outputs.command-output }}" | grep -oP 'https://pr-\d+-[^\s]+\.workers\.dev' | head -1)

          if [[ -z "$url" ]]; then
            echo "::error::Could not parse preview URL from wrangler output"
            exit 1
          fi

          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Update PR description with preview URL
        uses: nefrob/pr-description@4dcc9f3ad5ec06b2a197c5f8f93db5e69d2fdca7 # v1.2.0
        with:
          content: |
            <!-- start Preview docs URL -->
            <details>
            <summary>Preview docs</summary>

            | Site | URL |
            | --- | --- |
            | Docs | [${{ steps.url.outputs.url }}](${{ steps.url.outputs.url }}) |

            </details>
            <!-- end Preview docs URL -->
          regex: '<!-- start Preview docs URL -->.*?<!-- end Preview docs URL -->'
          regexFlags: ims
          appendContentOnMatchOnly: 'true'
          token: ${{ secrets.GITHUB_TOKEN }}
