name: CI

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci

  bundle-projects:
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.projects.outputs.projects }}
      has-projects: ${{ steps.projects.outputs.has_projects }}
      count: ${{ steps.projects.outputs.count }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - id: projects
        shell: bash
        run: |
          set -euo pipefail

          affected="$(pnpm exec turbo query affected --tasks build --base origin/${{ github.base_ref }} --head HEAD | sed -n '/^{/,$p')"
          workspaces="$(pnpm exec turbo ls --output=json | sed -n '/^{/,$p')"
          projects="[]"

          while IFS= read -r project; do
            path="$(jq -r '.path' <<< "$project")"
            manifest="$path/package.json"

            if jq -e '
              .private != true
              and (.scripts.build | type == "string")
              and (.files | type == "array" and index("dist") != null)
            ' "$manifest" > /dev/null; then
              name="$(jq -r '.name' <<< "$project")"
              slug="$(jq -nr --arg name "$name" '$name | sub("^@"; "") | gsub("[^a-zA-Z0-9]+"; "-") | sub("^-"; "") | sub("-$"; "")')"
              projects="$(jq -c --arg name "$name" --arg path "$path" --arg slug "$slug" '. + [{ name: $name, path: $path, slug: $slug }]' <<< "$projects")"
            fi
          done < <(
            jq -c --argjson workspaces "$workspaces" '
              [.data.affectedTasks.items[].package.name]
              | unique
              | map(. as $name | $workspaces.packages.items[] | select(.name == $name))
              | map(select(.path | startswith("packages/")))
              | .[]
            ' <<< "$affected"
          )

          projects="$(jq -c 'sort_by(.name)' <<< "$projects")"
          count="$(jq 'length' <<< "$projects")"

          echo "projects=$projects" >> "$GITHUB_OUTPUT"
          echo "has_projects=$([[ "$count" -gt 0 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"

          if [[ "$count" -gt 0 ]]; then
            {
              echo "### Affected Bundle Projects"
              echo
              echo "| Package | Path |"
              echo "| --- | --- |"
              jq -r '.[] | "| \(.name) | `\(.path)` |"' <<< "$projects"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "### Affected Bundle Projects"
              echo
              echo "No affected publishable packages with build output."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  bundle-size:
    needs: bundle-projects
    if: ${{ needs.bundle-projects.outputs.has-projects == 'true' }}
    runs-on: ubuntu-latest
    name: Bundle size (${{ matrix.project.name }})
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.bundle-projects.outputs.projects) }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - uses: preactjs/compressed-size-action@2.9.1
        env:
          BUNDLE_ANALYZE: 'true'
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          install-script: pnpm install --frozen-lockfile
          cwd: ${{ matrix.project.path }}
          build-script: build
          pattern: dist/**/*.js
          exclude: '{**/*.map,**/node_modules/**,**/bundle-analysis.json}'
          comment-key: bundle-${{ matrix.project.slug }}
          strip-hash: '-([A-Za-z0-9_-]{8})(?=\.js$)'
