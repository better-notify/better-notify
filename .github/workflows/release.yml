name: Release Please + npm publish

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
      web_release_created: ${{ steps.release.outputs['apps/web--release_created'] }}
    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.BETTER_NOTIFY_APP_ID }}
          private-key: ${{ secrets.BETTER_NOTIFY_APP_PRIVATE_KEY }}

      - name: Release Please
        uses: googleapis/release-please-action@v5.0.0
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish ${{ matrix.path }}
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        path: ${{ fromJSON(needs.release-please.outputs.paths_released) }}
        exclude:
          - path: apps/web
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/prepare
        with:
          registry-url: https://registry.npmjs.org

      - name: Build
        run: pnpm exec turbo run build --filter='./${{ matrix.path }}...'

      - uses: ./.github/actions/publish-packages
        with:
          filter: './${{ matrix.path }}'
          tag: alpha
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag as latest
        working-directory: ${{ matrix.path }}
        run: |
          set -euo pipefail
          PKG_NAME=$(node -e "console.log(require('./package.json').name)")
          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")
          npm dist-tag add "${PKG_NAME}@${PKG_VERSION}" latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy-web:
    name: Deploy website
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.web_release_created == 'true' }}
    environment: production
    concurrency:
      group: deploy-web
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/prepare

      - name: Deploy
        run: pnpm web:deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
